name: Publish

# Publishes to PyPI on a version tag via Trusted Publishing (OIDC, no token to store).
# Configure the trusted publisher once at https://pypi.org/manage/account/publishing/
on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v5
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
      - id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          append_body: true
          body: "📦 [chefe ${{ steps.ver.outputs.version }} on PyPI](https://pypi.org/project/chefe/${{ steps.ver.outputs.version }}/)"
