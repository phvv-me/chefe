site_name: chefe
site_description: One manifest for every package manager.
site_url: https://phvv.me/chefe/
repo_url: https://github.com/phvv-me/chefe
repo_name: phvv-me/chefe
copyright: Apache-2.0 · Pedro Valois

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: amber
      toggle:
        icon: material/weather-night
        name: Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - toc.integrate

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Manifest: manifest.md
  - Commands: commands.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite

plugins:
  - search
  - i18n:
      docs_structure: suffix
      reconfigure_material: true
      reconfigure_search: true
      fallback_to_default: true
      languages:
        - locale: en
          name: English
          default: true
        - locale: pt-BR
          name: Português (BR)
          build: true
        - locale: es
          name: Español
          build: true
        - locale: ja
          name: 日本語
          build: true
        - locale: zh
          name: 简体中文
          build: true
        - locale: zh-TW
          name: 繁體中文
          build: true
  - llmstxt:
      markdown_description: One manifest for conda, PyPI, npm, cargo and more, compiled into native files and run by the real tools.
      full_output: llms-full.txt
      sections:
        Usage:
          - index.md
          - commands.md
        Reference:
          - manifest.md
